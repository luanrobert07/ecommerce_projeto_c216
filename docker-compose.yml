services:
  db:
    image: postgres:16-alpine
    container_name: stackstore-db
    environment:
      POSTGRES_DB: stackstore
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d stackstore"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
    container_name: stackstore-api
    environment:
      PORT: 3001
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: stackstore
      CORS_ORIGIN: http://localhost:3003
      LOG_FILE_PATH: /app/logs/app.log
    ports:
      - "3001:3001"
    volumes:
      - ./backend/logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health"]
      interval: 5s
      timeout: 5s
      retries: 12
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3001
    container_name: stackstore-web
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
      API_INTERNAL_URL: http://api:3001
    ports:
      - "3003:3000"
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
